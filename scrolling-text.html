<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Letter-by-Letter Dynamic Scroll Rotation</title>
  
  <style>
    /* ==========================================
       ANIMATION & POSITIONING ESSENTIAL CSS
       ========================================== */
    
    body {
      margin: 0;
      padding: 0;
      background-color: #0d0d0d;
      color: #ffffff;
      font-family: sans-serif;
    }

    .section.cc-scrolling-text {
      position: relative;
      height: 250vh;
      width: 100%;
    }

    .container.cc-scrolling-text {
      position: sticky;
      top: 0;
      height: 100vh;
      width: 100%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    .sticky {
      width: 100%;
      display: flex;
      white-space: nowrap;
      will-change: transform;
    }

    .scrolling-text {
      display: inline-block;
      white-space: nowrap;
      font-size: 8vw;
      font-weight: 900;
      text-transform: uppercase;
      transform: translateX(100vw);
      will-change: transform;
      margin: 0;
    }

    /* প্রতিটি Letter আলাদাভাবে রোটেট করার জন্য CSS Rules */
    .char {
      display: inline-block;
      will-change: transform;
      transform-origin: center center;
    }
  </style>
</head>
<body>

  <!-- Webflow HTML Structure -->
  <section class="section cc-scrolling-text">
    <div class="container cc-scrolling-text">
      <div class="sticky">
        <h2 class="scrolling-text">A LEGENDARY TRACK RECORD</h2>
      </div>
    </div>
    <div class="overlay cc-scrolling-text"></div>
  </section>

  <!-- GSAP & ScrollTrigger CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      gsap.registerPlugin(ScrollTrigger);

      const scrollingText = document.querySelector(".scrolling-text");
      const sectionWrapper = document.querySelector(".section.cc-scrolling-text");

      if (scrollingText && sectionWrapper) {
        
        // ১. প্রতিটি Letter-কে আলাদা <span> wrapper এ ভাগ করে নেওয়া
        const textContent = scrollingText.textContent;
        scrollingText.innerHTML = "";
        
        [...textContent].forEach(char => {
          const span = document.createElement("span");
          span.classList.add("char");
          // Space বজায় রাখার জন্য &nbsp; ব্যবহার
          span.innerHTML = char === " " ? "&nbsp;" : char;
          scrollingText.appendChild(span);
        });

        const chars = scrollingText.querySelectorAll(".char");

        // ২. Horizontal Track Move Animation
        gsap.to(scrollingText, {
          x: "-100%",
          ease: "none",
          scrollTrigger: {
            trigger: sectionWrapper,
            start: "top top",
            end: "bottom bottom",
            scrub: 1,
            
            // ৩. স্ক্রোল ডিরেকশন অনুযায়ী প্রতিটি Letter রোটেট করা
            onUpdate: (self) => {
              let targetRotation = self.direction === 1 ? -4 : 4;

              // GSAP Stagger দিয়ে প্রতি লেটারে ওয়েভ ইফেক্ট তৈরি
              gsap.to(chars, {
                rotate: targetRotation,
                duration: 0.35,
                ease: "power1.out",
                stagger: 0.015,
                overwrite: "auto"
              });
            }
          }
        });

        // ৪. স্ক্রোল থামলে লেটারগুলো আবার ০ ডিগ্রিতে সোজা হওয়া
        ScrollTrigger.addEventListener("scrollEnd", () => {
          gsap.to(chars, {
            rotate: 0,
            duration: 0.45,
            ease: "power2.out",
            stagger: 0.01
          });
        });

      }
    });
  </script>

</body>
</html>
