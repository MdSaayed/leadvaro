<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouse Trail Image Reveal</title>

</head>

<body>
    <section class="mouse-trail" id="trail">
         
    </section>

    <style>
        /* Section Wrapper Setup */
        .mouse-trail {
            position: relative;
            width: 100%;
            min-height: 100vh;
            background-color: #000000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 8%;
            overflow: hidden;
            box-sizing: border-box;
        }

       
        .trail-img {
            position: absolute;
            width: 200px;
            height: 140px;
            object-fit: cover;
            border-radius: 12px;
            pointer-events: none;
            transform: translate(-50%, -50%) scale(0);
            z-index: 1;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
            will-change: transform, opacity;
        }

        @media (max-width: 768px) {
            .trail-content-wrapper {
                flex-direction: column;
                align-items: flex-start;
            }

            .trail-img {
                width: 160px;
                height: 110px;
            }
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Webflow specific image links or Unsplash placeholder URLs
            const images = [
                "https://images.unsplash.com/photo-1546519638-68e109498ffc?q=80&w=600",
                "https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=600",
                "https://images.unsplash.com/photo-1519766304817-4f37bda74a29?q=80&w=600",
                "https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=600",
                "https://images.unsplash.com/photo-1517649763962-0c623266ddc0?q=80&w=600"
            ];

            const section = document.getElementById('trail');
            if (!section) return;

            let imgIndex = 0;
            let lastX = 0;
            let lastY = 0;
            const threshold = 75; // Distance gap between images

            section.addEventListener('mousemove', (e) => {
                const rect = section.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                const distance = Math.hypot(x - lastX, y - lastY);

                if (distance > threshold) {
                    createTrailImage(x, y);
                    lastX = x;
                    lastY = y;
                }
            });

            function createTrailImage(x, y) {
                const img = document.createElement('img');
                img.src = images[imgIndex];
                img.classList.add('trail-img');
                img.style.left = `${x}px`;
                img.style.top = `${y}px`;

                section.appendChild(img);

                imgIndex = (imgIndex + 1) % images.length;
                const randomRotation = (Math.random() - 0.5) * 30;

                const tl = gsap.timeline({
                    onComplete: () => img.remove()
                });

                tl.to(img, {
                    scale: 1,
                    rotation: randomRotation,
                    duration: 0.35,
                    ease: "back.out(1.5)"
                })
                    .to(img, {
                        scale: 0.6,
                        opacity: 0,
                        duration: 0.4,
                        delay: 0.2,
                        ease: "power2.in"
                    });
            }
        });
    </script>

</body>

</html>
