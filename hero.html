<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Essential Animation-Only CSS Test</title>
  <style>
    /* 1. Animation-Essential Structural Setup */
    .section_hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .hero-bg-wrapper {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .hero-bg-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
    }





    /* 2. Stacking Cards Essential Positioning */
    .intro-stack-wrapper {
      position: absolute;
      inset: 0;
      z-index: 50;
      pointer-events: none;
    }

    .stack-card {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) translateY(100%);
      opacity: 0;
      overflow: hidden;
    }

    .stack-card.is-card-1 { z-index: 51; width: 60vw; height: 45vh; }
    .stack-card.is-card-2 { z-index: 52; width: 78vw; height: 38vh; }
    .stack-card.is-card-3 { z-index: 53; width: 92vw; height: 30vh; }

    .stack-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }



    /* 3. Player Wrapper & SVG Mask Requirements */
    .hero-image-wrapper {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      width: 420px;
      height: 85vh;
      z-index: 20;
      opacity: 0;
    }

    .player-img-base,
    .player-img-hover {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .player-img-hover {
      z-index: 2;
      filter: sepia(1) saturate(8) hue-rotate(-50deg);
      clip-path: url(#blob-clip); /* SVG Clip Path Link */
    }





    /* 4. Layout Container & Slider Position */
    .container_hero {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none;
    }

    .hero-slider {
      position: absolute;
      bottom: 2rem;
      right: 0;
      width: 260px;
      height: 160px;
      opacity: 0;
      transform: translateY(30px);
      z-index: 21;
    }

    .slide-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.8s ease-in-out;
    }

    .slide-img.active {
      opacity: 1;
    }

    /* 5. Curtain Reveal Dynamic Engine */
    [data-hero-reveal-wrapper] {
      position: relative;
      display: inline-block;
      overflow: hidden;
      --c-width: 0%;
      --c-left: 0%;
    }

    [data-hero-reveal-wrapper]::after {
      content: "";
      position: absolute;
      top: 0;
      left: var(--c-left);
      width: var(--c-width);
      height: 100%;
      background-color: #8B2626;
      z-index: 2;
    }

    [data-hero-title-text] {
      width: 0%;
      overflow: hidden;
      white-space: nowrap;
    }
  </style>
</head>
<body style="background: #000; color: #fff; margin: 0;">

  <!-- Hidden SVG ClipPath for Masking -->
  <div style="position: absolute; width: 0; height: 0; overflow: hidden;">
    <svg width="0" height="0">
      <defs>
        <clipPath id="blob-clip" clipPathUnits="userSpaceOnUse">
          <path id="svg-blob-path" d="M 0,0 Z" />
        </clipPath>
      </defs>
    </svg>
  </div>

  <section class="section_hero">

    <!-- Hero Background -->
    <div class="hero-bg-wrapper">
      <img src="https://images.unsplash.com/photo-1546519638-68e109498ffc?q=80&w=1600&auto=format&fit=crop" id="heroBg" alt="Hero Background" class="hero-bg-img">
    </div>

    <!-- Bottom Deck Stacking Area -->
    <div class="intro-stack-wrapper">
      <div class="stack-card is-card-1">
        <img src="https://images.unsplash.com/photo-1519861531473-9200262188bf?q=80&w=800&auto=format&fit=crop" alt="Card 1">
      </div>
      <div class="stack-card is-card-2">
        <img src="https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=800&auto=format&fit=crop" alt="Card 2">
      </div>
      <div class="stack-card is-card-3">
        <img src="https://images.unsplash.com/photo-1546519638-68e109498ffc?q=80&w=1600&auto=format&fit=crop" alt="Card 3">
      </div>
    </div>

    <!-- Player Image Container (Mask Target) -->
    <div id="playerWrapper" class="hero-image-wrapper">
      <div class="player-img-container">
        <img src="https://cdn.prod.website-files.com/6a5e2831c12318e8f7a49e03/6a5f2de59a54c23f6d08bc17_medium-shot-man-playing-basketball%201.png" alt="Player Grayscale" class="player-img-base">
        <img src="https://cdn.prod.website-files.com/6a5e2831c12318e8f7a49e03/6a5f2de59a54c23f6d08bc17_medium-shot-man-playing-basketball%201.png" alt="Player Masked" class="player-img-hover">
      </div>
    </div>

    <!-- Main Content Layout -->
    <div class="container_hero">
      
      <!-- Top Content -->
      <div>
        <div data-hero-reveal-wrapper="top">
          <p data-hero-title-text style="font-size: 1.2rem;">Where passion fuels every play, discipline drives every move.</p>
        </div>
      </div>

      <!-- Bottom Title -->
      <div style="position: absolute; bottom: 2rem; left: 2rem;">
        <div data-hero-reveal-wrapper="title">
          <h1 data-hero-title-text style="font-size: 3rem; font-family: sans-serif;">WHERE STRENGTH</h1>
        </div>
        <br>
        <div data-hero-reveal-wrapper="title">
          <h1 data-hero-title-text style="font-size: 3rem; font-family: sans-serif;">IS REFINED INTO</h1>
        </div>
        <br>
        <div data-hero-reveal-wrapper="title">
          <h1 data-hero-title-text style="font-size: 3rem; font-family: sans-serif;">DOMINANCE</h1>
        </div>
      </div>

      <!-- Slider Component -->
      <div data-hero-slider="true" class="hero-slider">
        <img src="https://images.unsplash.com/photo-1519861531473-9200262188bf?q=80&w=600&auto=format&fit=crop" alt="Slide 1" class="slide-img active">
        <img src="https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=600&auto=format&fit=crop" alt="Slide 2" class="slide-img">
        <img src="https://images.unsplash.com/photo-1518063319789-7217e6706b04?q=80&w=600&auto=format&fit=crop" alt="Slide 3" class="slide-img">
      </div>

    </div>
  </section>

  <!-- GSAP Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const masterTL = gsap.timeline();

      // Curtain Effect Function
      function animateCurtain(wrapper) {
        const textElement = wrapper.querySelector('[data-hero-title-text]');
        const tl = gsap.timeline();

        tl.to(wrapper, {
          "--c-width": "100%",
          duration: 0.5,
          ease: "power2.in"
        })
        .to(wrapper, {
          "--c-left": "100%",
          "--c-width": "0%",
          duration: 0.45,
          ease: "power2.out"
        })
        .to(textElement, {
          width: "100%",
          duration: 0.45,
          ease: "power2.out"
        }, "<");

        return tl;
      }

      // 1. Bottom Card Stacking Intro
      const cards = document.querySelectorAll('.stack-card');
      cards.forEach((card, index) => {
        masterTL.to(card, {
          opacity: 1,
          y: "0%",
          duration: 0.5,
          ease: "power3.out"
        }, index * 0.25);
      });

      // Expand Card 3 to Fill Background
      masterTL.to('.is-card-3', {
        width: "100vw",
        height: "100vh",
        duration: 0.7,
        ease: "power2.inOut"
      }, "+=0.2");

      masterTL.to('.hero-bg-img', { opacity: 1, duration: 0.1 });
      masterTL.to('.intro-stack-wrapper', { display: "none" });

      // 2. Elements Fade In
      const step2TL = gsap.timeline();
      step2TL.to('.hero-image-wrapper', { opacity: 1, y: 0, duration: 0.8, ease: "power3.out" }, 0);

      const topWrapper = document.querySelector('[data-hero-reveal-wrapper="top"]');
      if (topWrapper) step2TL.add(animateCurtain(topWrapper), 0);

      step2TL.to('.hero-slider', { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }, 0);
      masterTL.add(step2TL);

      // 3. Title Curtain Reveal
      const titleWrappers = document.querySelectorAll('[data-hero-reveal-wrapper="title"]');
      titleWrappers.forEach((wrapper, index) => {
        masterTL.add(animateCurtain(wrapper), index === 0 ? "+=0.1" : "-=0.25");
      });

      // Slider Auto Loop
      const slides = document.querySelectorAll('.slide-img');
      let currentSlide = 0;
      setInterval(() => {
        slides[currentSlide].classList.remove('active');
        currentSlide = (currentSlide + 1) % slides.length;
        slides[currentSlide].classList.add('active');
      }, 2500);

      // 4. Multi-Corner Animated Dynamic Hover Mask Logic
      const playerWrapper = document.getElementById('playerWrapper');
      const svgBlobPath = document.getElementById('svg-blob-path');

      let mouse = { x: 0, y: 0 };
      let currentPos = { x: 0, y: 0 };
      let isHovered = false;
      let time = 0;

      function createMultiCornerPath(cx, cy, r, t) {
        const totalPoints = 16;
        let d = "";

        for (let i = 0; i < totalPoints; i++) {
          const angle = (i / totalPoints) * Math.PI * 2;
          const cornerNoise = Math.sin(angle * 5 + t * 0.08) * 22 + 
                              Math.cos(angle * 3 - t * 0.06) * 16 + 
                              Math.sin(angle * 8 + t * 0.1) * 8;
          
          const currentRadius = r + cornerNoise;
          const x = cx + Math.cos(angle) * currentRadius;
          const y = cy + Math.sin(angle) * currentRadius;

          if (i === 0) {
            d += `M ${x},${y}`;
          } else {
            d += ` L ${x},${y}`;
          }
        }
        d += " Z";
        return d;
      }

      function renderMaskAnimation() {
        if (isHovered) {
          time += 1;
          currentPos.x += (mouse.x - currentPos.x) * 0.18;
          currentPos.y += (mouse.y - currentPos.y) * 0.18;

          const maskPath = createMultiCornerPath(currentPos.x, currentPos.y, 115, time);
          svgBlobPath.setAttribute('d', maskPath);
        }
        requestAnimationFrame(renderMaskAnimation);
      }
      renderMaskAnimation();

      playerWrapper.addEventListener('mousemove', (e) => {
        const rect = playerWrapper.getBoundingClientRect();
        mouse.x = e.clientX - rect.left;
        mouse.y = e.clientY - rect.top;

        if (!isHovered) {
          currentPos.x = mouse.x;
          currentPos.y = mouse.y;
          isHovered = true;
        }
      });

      playerWrapper.addEventListener('mouseleave', () => {
        isHovered = false;
        svgBlobPath.setAttribute('d', 'M 0,0 Z');
      });
    });
  </script>
</body>
</html>
